{% extends "base.html" %}

{% block content %}
<div class="mb-6 flex flex-col md:flex-row items-start md:items-end justify-between gap-4">
    <div>
        <h1 class="text-3xl font-extrabold text-white tracking-tight mb-2">每日简报 <span
                class="bg-clip-text text-transparent bg-gradient-to-r from-indigo-400 to-purple-400">Daily Digest</span>
        </h1>
        <p class="text-gray-400 text-sm">这里是 Scout 为你自动化过滤、总结的行业与前沿资讯。点个赞让系统更懂你。</p>
    </div>

    <!-- Filter Controls -->
    <div class="flex items-center gap-3 w-full md:w-auto">
        <select id="taskFilter"
            class="bg-gray-900 border border-gray-700 text-white text-sm rounded-lg focus:ring-indigo-500 focus:border-indigo-500 block w-full p-2.5 transition shadow-inner">
            <option value="">所有采集任务 (All Tasks)</option>
            {% for task in tasks %}
            <option value="{{ task.id }}">{{ task.name }}</option>
            {% endfor %}
        </select>

        <input type="date" id="dateFilter"
            class="bg-gray-900 border border-gray-700 text-white text-sm rounded-lg focus:ring-indigo-500 focus:border-indigo-500 block w-full p-2.5 transition shadow-inner"
            placeholder="YYYY-MM-DD">
    </div>
</div>

<!-- Items Container -->

<!-- Items Container -->
<div id="itemsContainer" class="space-y-6">
    <!-- Populated by JS -->
</div>

<!-- Loading / Sentinel -->
<div id="loadingSentinel" class="py-12 mt-6 flex flex-col justify-center items-center text-gray-500">
    <svg class="animate-spin h-8 w-8 text-indigo-500 mb-4" xmlns="http://www.w3.org/2000/svg" fill="none"
        viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-75" fill="currentColor"
            d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
        </path>
    </svg>
    <p class="text-sm" id="loadingText">正在加载更多资讯...</p>
</div>

<!-- Templates for JS injected HTML -->
<template id="itemTemplate">
    <article
        class="bg-gray-900/40 border border-gray-800 rounded-2xl p-6 transition duration-300 hover:bg-gray-800/50 hover:border-gray-700 shadow-xl shadow-black/20 group relative overflow-hidden">
        <div
            class="absolute -inset-px bg-gradient-to-r from-indigo-500 to-purple-500 rounded-2xl opacity-0 group-hover:opacity-10 transition duration-500 blur z-0">
        </div>
        <div class="relative z-10 flex flex-col gap-4">
            <!-- Meta row -->
            <div class="flex items-center gap-3 text-xs font-medium text-gray-500 flex-wrap">
                <span class="item-source px-2 py-1 bg-gray-800 text-gray-300 rounded uppercase tracking-wider"></span>
                <span class="item-time"></span>
                <span
                    class="item-score flex items-center ml-auto bg-gray-900 px-2 py-0.5 rounded border border-gray-800">
                    <svg class="w-3 h-3 mr-1" fill="currentColor" viewBox="0 0 20 20">
                        <path
                            d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z">
                        </path>
                    </svg>
                    Score: <span class="score-val"></span>
                </span>
            </div>
            <!-- Title -->
            <h2 class="text-xl font-bold text-gray-100 leading-tight">
                <a href="#" target="_blank" class="item-link hover:text-indigo-400 transition break-words"></a>
            </h2>
            <!-- Summary: full-height prose display -->
            <div class="prose prose-invert prose-sm max-w-none text-gray-300 leading-relaxed">
                <div class="item-summary pl-4 border-l-2 border-indigo-500 bg-indigo-500/5 rounded-r py-2"></div>
            </div>
            <!-- Reason -->
            <p class="item-reason-container text-sm text-gray-500 flex items-start hidden">
                <svg class="w-4 h-4 mr-2 text-purple-400 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor"
                    viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
                <span class="item-reason"></span>
            </p>
            <!-- Feedback buttons at the BOTTOM -->
            <div class="flex items-center gap-3 pt-4 border-t border-gray-800/60">
                <button
                    class="btn-like flex items-center gap-2 px-4 py-2 rounded-xl transition duration-200 border bg-gray-800 text-gray-400 border-gray-700 hover:bg-indigo-600 hover:text-white hover:border-transparent text-sm font-medium">
                    <span class="text-base">👍</span> 有用
                </button>
                <button
                    class="btn-dislike flex items-center gap-2 px-4 py-2 rounded-xl transition duration-200 border bg-gray-800 text-gray-400 border-gray-700 hover:bg-red-600 hover:text-white hover:border-transparent text-sm font-medium">
                    <span class="text-base opacity-80">👎</span> 噪音
                </button>
            </div>
        </div>
    </article>
</template>

<!-- Include marked.js for parsing markdown in frontend -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
    let currentOffset = 0;
    const LIMIT = 10;
    let isFetching = false;
    let hasMore = true;

    const itemsContainer = document.getElementById('itemsContainer');
    const template = document.getElementById('itemTemplate');
    const sentinel = document.getElementById('loadingSentinel');
    const loadingText = document.getElementById('loadingText');
    const taskFilter = document.getElementById('taskFilter');
    const dateFilter = document.getElementById('dateFilter');


    async function loadItems(reset = false) {
        if (isFetching || (!hasMore && !reset)) return;
        isFetching = true;

        if (reset) {
            currentOffset = 0;
            hasMore = true;
            itemsContainer.innerHTML = '';
            sentinel.style.display = 'flex';
            loadingText.innerText = "正在拉取数据...";
        }

        const taskId = taskFilter.value;
        const dateVal = dateFilter.value;

        const params = new URLSearchParams({
            limit: LIMIT,
            offset: currentOffset
        });
        if (taskId) params.append('task_id', taskId);
        if (dateVal) params.append('date', dateVal);

        try {
            const res = await fetch(`/api/items?${params.toString()}`);
            const data = await res.json();

            if (data.status === 'success') {
                const items = data.items;


                if (items.length === 0) {
                    hasMore = false;
                    sentinel.classList.remove('animate-pulse');
                    sentinel.querySelector('svg').classList.add('hidden');
                    loadingText.innerText = currentOffset === 0 ? "暂无符合条件的简报数据" : "没有更多数据了";
                } else {
                    items.forEach(item => {
                        const clone = template.content.cloneNode(true);

                        clone.querySelector('.item-source').textContent = item.source;
                        clone.querySelector('.item-time').textContent = new Date(item.publish_time).toLocaleString();

                        const scoreEl = clone.querySelector('.item-score');
                        if (item.score >= 80) scoreEl.classList.add('text-green-400');
                        else scoreEl.classList.add('text-indigo-400');
                        clone.querySelector('.score-val').textContent = item.score;

                        const link = clone.querySelector('.item-link');
                        link.href = item.url;
                        link.textContent = item.title;

                        clone.querySelector('.item-summary').innerHTML = marked.parse(item.summary || '');

                        if (item.reason) {
                            clone.querySelector('.item-reason-container').classList.remove('hidden');
                            clone.querySelector('.item-reason').textContent = item.reason;
                        }

                        // Buttons setup
                        const btnLike = clone.querySelector('.btn-like');
                        const btnDislike = clone.querySelector('.btn-dislike');

                        // Set initial visual state
                        if (item.is_liked === 1) {
                            btnLike.className = "btn-like flex flex-col items-center justify-center p-3 rounded-xl transition duration-200 border w-16 bg-indigo-600 text-white border-transparent";
                        } else if (item.is_liked === 0) {
                            btnDislike.className = "btn-dislike flex flex-col items-center justify-center p-3 rounded-xl transition duration-200 border w-16 bg-red-600 text-white border-transparent";
                        }

                        btnLike.onclick = function () { sendFeedback(item.id, 'like', this, btnDislike); };
                        btnDislike.onclick = function () { sendFeedback(item.id, 'dislike', this, btnLike); };

                        itemsContainer.appendChild(clone);
                    });

                    currentOffset += items.length;
                    if (items.length < LIMIT) {
                        hasMore = false;
                        sentinel.querySelector('svg').classList.add('hidden');
                        loadingText.innerText = "没有更多数据了";
                    }
                }
            }
        } catch (e) {
            console.error(e);
            loadingText.innerText = "数据加载失败，请重试";
            sentinel.querySelector('svg').classList.add('hidden');
        } finally {
            isFetching = false;
        }
    }

    // Feedback function adapted for infinite UI
    async function sendFeedback(itemId, action, currentBtn, siblingBtn) {
        try {
            const res = await fetch('/api/feedback', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ item_id: itemId, action: action })
            });
            const data = await res.json();

            if (data.status === 'success') {
                // reset sibling
                siblingBtn.className = "btn-" + (action === 'like' ? 'dislike' : 'like') + " flex items-center gap-2 px-4 py-2 rounded-xl transition duration-200 border bg-gray-800 text-gray-400 border-gray-700 hover:bg-gray-700 hover:text-white text-sm font-medium";
                // activate current
                if (action === 'like') {
                    currentBtn.className = "btn-like flex items-center gap-2 px-4 py-2 rounded-xl transition duration-200 border bg-indigo-600 text-white border-transparent text-sm font-medium";
                } else {
                    currentBtn.className = "btn-dislike flex items-center gap-2 px-4 py-2 rounded-xl transition duration-200 border bg-red-600 text-white border-transparent text-sm font-medium";
                }
            }
        } catch (e) { console.error('Error sending feedback:', e); }
    }

    // Set up Intersection Observer for Infinite Scroll
    const observer = new IntersectionObserver((entries) => {
        if (entries[0].isIntersecting && !isFetching && hasMore) {
            loadItems();
        }
    }, { rootMargin: '200px' });

    observer.observe(sentinel);

    // Filter event listeners
    taskFilter.addEventListener('change', () => loadItems(true));
    dateFilter.addEventListener('change', () => loadItems(true));

    // Initial fetch
    // loadItems(true) will be triggered by observer hitting the sentinel immediately usually,
    // but we can call it explicitly to be safe:
    // loadItems(true);
</script>

<style>
    /* Custom Scrollbar for a more premium look */
    .scrollbar-thin::-webkit-scrollbar {
        width: 4px;
    }

    .scrollbar-thin::-webkit-scrollbar-track {
        background: rgba(31, 41, 55, 0.5);
        border-radius: 10px;
    }

    .scrollbar-thin::-webkit-scrollbar-thumb {
        background: rgba(99, 102, 241, 0.3);
        border-radius: 10px;
    }

    .scrollbar-thin::-webkit-scrollbar-thumb:hover {
        background: rgba(99, 102, 241, 0.5);
    }

    /* Force text to wrap inside item-summary (including markdown content) */
    .item-summary,
    .item-summary * {
        overflow-wrap: anywhere;
        word-break: break-word;
        white-space: normal;
    }

    /* Ensure long titles also wrap */
    .item-link {
        word-break: break-word;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
    }
</style>
{% endblock %}
