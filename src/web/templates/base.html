<!DOCTYPE html>
<html lang="zh-CN" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scout Agent</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        gray: {
                            850: '#1f2937',
                            900: '#111827',
                            950: '#030712',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #030712;
            color: #f3f4f6;
        }

        .glass {
            background: rgba(31, 41, 55, 0.4);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>

<body class="min-h-screen antialiased selection:bg-indigo-500 selection:text-white">
    <nav class="sticky top-0 z-50 glass border-b border-gray-800">
        <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center space-x-3">
                    <div
                        class="w-8 h-8 rounded bg-gradient-to-tr from-indigo-500 to-purple-500 flex items-center justify-center text-white font-bold text-lg shadow-lg shadow-indigo-500/30">
                        S</div>
                    <span class="text-xl font-semibold tracking-tight text-white">Scout<span
                            class="text-indigo-400">Agent</span></span>
                </div>
                <div class="flex space-x-6">
                    <a href="/"
                        class="text-sm font-medium {% if request.url.path == '/' %}text-indigo-400{% else %}text-gray-400 hover:text-white{% endif %} transition cursor-pointer flex items-center gap-1.5">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9a2 2 0 00-2-2h-2m-4-3H9M7 16h6M7 8h6v4H7V8z">
                            </path>
                        </svg>
                        今日动态
                    </a>
                    <a href="/reports"
                        class="text-sm font-medium {% if request.url.path == '/reports' %}text-indigo-400{% else %}text-gray-400 hover:text-white{% endif %} transition cursor-pointer flex items-center gap-1.5">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z">
                            </path>
                        </svg>
                        执行报告
                    </a>
                    <a href="/config"
                        class="text-sm font-medium {% if request.url.path == '/config' %}text-indigo-400{% else %}text-gray-400 hover:text-white{% endif %} transition cursor-pointer flex items-center gap-1.5">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z">
                            </path>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                        </svg>
                        任务配置
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
        {% block content %}{% endblock %}
    </main>

    <script>
        // Setup API requests for likes/dislikes
        async function sendFeedback(itemId, action, buttonElement) {
            try {
                const response = await fetch('/api/feedback', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ item_id: itemId, action: action })
                });

                if (response.ok) {
                    // Micro-animation feedback
                    const parent = buttonElement.parentElement;
                    const buttons = parent.querySelectorAll('button');

                    buttons.forEach(btn => {
                        btn.classList.remove('bg-indigo-600', 'bg-red-600', 'text-white', 'border-transparent');
                        btn.classList.add('bg-gray-800', 'text-gray-400');
                    });

                    if (action === 'like') {
                        buttonElement.classList.remove('bg-gray-800', 'text-gray-400');
                        buttonElement.classList.add('bg-indigo-600', 'text-white', 'border-transparent');
                    } else {
                        buttonElement.classList.remove('bg-gray-800', 'text-gray-400');
                        buttonElement.classList.add('bg-red-600', 'text-white', 'border-transparent');
                    }
                }
            } catch (error) {
                console.error("Failed to send feedback:", error);
            }
        }
    </script>
</body>

</html>
